spring:
  application:
    name: ms-home
  # Rule 3.1 / Rule 4 — virtual threads for Spring MVC (Java 21 Loom).
  threads:
    virtual:
      enabled: true
  # Rule 6 — never hardcode infra. Everything below is env-overridable.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}

# Rule 5 — graceful shutdown for Cloud Run.
server:
  shutdown: graceful

# Rule 11 + logger-handler — structured JSON logging, runtime-configurable levels.
logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.liverpool.ms_home: ${LOG_LEVEL_APP:INFO}

# Rule 9 — observability. Actuator on a dedicated management port (default 8081) so it is never
# reachable via the API gateway. K8s liveness/readiness probes target this port directly.
# The main application port (8080) is the only gateway-exposed surface.
management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,loggers,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Rule 6 — content-service (Contentstack proxy) integration contract. No secrets in code.
# Local default 8082 avoids collision with the management port (8081).
content-service:
  base-url: ${CONTENT_SERVICE_BASE_URL:http://localhost:8082}
  default-brand: ${CONTENT_SERVICE_BRAND:LP}
  preview-header: x-preview
  connect-timeout: ${CONTENT_SERVICE_CONNECT_TIMEOUT:2s}
  read-timeout: ${CONTENT_SERVICE_READ_TIMEOUT:5s}
  home-content-type: ${CONTENT_SERVICE_HOME_TYPE:page}
  home-entry-id: ${CONTENT_SERVICE_HOME_ENTRY:home}
  cache-ttl: ${CONTENT_SERVICE_CACHE_TTL:5m}
  l1-cache-ttl: ${CONTENT_SERVICE_L1_CACHE_TTL:30s}

# User requirement — circuit breakers: 5% failure-rate threshold, NO retries.
# Consumed programmatically by Resilience4jConfig (core Resilience4j, not the Spring-AOP starter).
resilience:
  circuit-breaker:
    failure-rate-threshold: ${CB_FAILURE_RATE_THRESHOLD:5}
    sliding-window-size: ${CB_SLIDING_WINDOW_SIZE:50}
    minimum-number-of-calls: ${CB_MIN_CALLS:20}
    wait-duration-in-open-state: ${CB_WAIT_OPEN:30s}
    permitted-calls-in-half-open-state: ${CB_HALF_OPEN_CALLS:5}

# Home composition feature flags (Rule 18) — per-block runtime enable/disable, no redeploy.
home:
  feature-flags:
    products-list-salesforce: ${FF_PRODUCTS_LIST_SALESFORCE:true}
  blocks:
    # Resolution endpoint paths advertised in dynamic placeholders.
    products-list-salesforce-endpoint: /home/blocks/products-list

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}

# Salesforce Evergage recommendation engine (Rule 19 reference: BFF SHARED_SALESFORCE_* env vars).
# authorizationValue must always be supplied via SALESFORCE_AUTHORIZATION env var — never committed.
salesforce:
  base-url: ${SALESFORCE_BASE_URL:https://serviciosliverpoolsadecv.us-4.evergage.com}
  actions-path: ${SALESFORCE_ACTIONS_PATH:/api2/authevent/liverpool}
  authorization-value: ${SALESFORCE_AUTHORIZATION:}
  timeout: ${SALESFORCE_TIMEOUT:4s}
  application: ${SALESFORCE_APPLICATION:Web}
  default-carousel-action: ${SALESFORCE_DEFAULT_CAROUSEL_ACTION:CMSOfertasIncreibles}
